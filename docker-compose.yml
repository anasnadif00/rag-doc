services:
  web:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_key_here}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_doc_chunks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      GENERATION_MODEL: ${GENERATION_MODEL:-gpt-4o-mini}
      KNOWLEDGE_BASE_PATH: ${KNOWLEDGE_BASE_PATH:-mock_knowledge_base}
      ERP_VERSION: ${ERP_VERSION:-v1.0}
      TOP_K: ${TOP_K:-5}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ragdoc:ragdoc@postgres:5432/ragdoc}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-rag-doc}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:-change-me-local-session-secret-32bytes}
      USER_HASH_SALT: ${USER_HASH_SALT:-change-me-local-user-hash-salt-32bytes}
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-admin}
      ADMIN_INITIAL_DISPLAY_NAME: ${ADMIN_INITIAL_DISPLAY_NAME:-Amministratore}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-dPP23@@12312dS}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-43200}
      WEB_CHAT_DEFAULT_TENANT_CODE: ${WEB_CHAT_DEFAULT_TENANT_CODE:-web-chat}
      WEB_COOKIE_SECURE: ${WEB_COOKIE_SECURE:-false}
      DATABASE_AUTO_CREATE: ${DATABASE_AUTO_CREATE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  qdrant:
    image: qdrant/qdrant
    ports:
      - "7200:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdoc}
      POSTGRES_USER: ${POSTGRES_USER:-ragdoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragdoc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data:
  redis_data:
