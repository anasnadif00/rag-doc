<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" />
    <link rel="icon" type="image/png" href="/magia-tab-logo.png" />
    <script>
      try {
        const savedTheme = localStorage.getItem("rag-doc-theme");
        document.documentElement.dataset.theme =
          savedTheme === "dark" || savedTheme === "light"
            ? savedTheme
            : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <meta
      name="description"
      content="Pannello di gestione e spazio di assistenza per organizzare aziende, contenuti e accessi."
    />
    <title>Magia IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
